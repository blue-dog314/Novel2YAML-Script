[project]
name = "screenplay-schema"
version = "0.1.0"
description = "Screenplay YAML schema definitions and JSON Schema"
requires-python = ">=3.12"
dependencies = [
    "shared-types",
]

[tool.uv.sources]
shared-types = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/screenplay_schema"]
