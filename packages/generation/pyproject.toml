[project]
name = "generation"
version = "0.1.0"
description = "Generation pipeline: chapter summary, scene planning, scene writing, repair"
requires-python = ">=3.12"
dependencies = [
    "shared-types",
    "validators",
    "exporters",
]

[tool.uv.sources]
shared-types = { workspace = true }
validators = { workspace = true }
exporters = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/generation"]
