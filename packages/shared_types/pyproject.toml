[project]
name = "shared-types"
version = "0.1.0"
description = "Shared version constants and future Pydantic data models"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared_types"]
