[project]
name = "exporters"
version = "0.1.0"
description = "YAML export and serialization"
requires-python = ">=3.12"
dependencies = [
    "shared-types",
    "ruamel.yaml>=0.18",
]

[tool.uv.sources]
shared-types = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/exporters"]
